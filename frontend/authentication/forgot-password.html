<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password — Predictive Maintenance System</title>
    <link rel="stylesheet" href="auth-shared.css">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon/favicon-light.svg">
</head>
<body class="auth-page-body">
    <div class="auth-shell">
        <div class="auth-card">
            <h2>Forgot your password?</h2>
            <p class="subtitle">Enter your email and we'll send you a reset link.</p>

            <div class="banner success" id="successBanner"></div>

            <form id="forgotForm">
                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@company.com">
                </div>
                <button class="cta" type="submit" id="submitButton">Send reset link</button>
            </form>

            <p class="auth-links">
                <a href="login.html">Back to sign in</a>
            </p>
        </div>
    </div>

    <script src="auth-shared.js"></script>
    <script>
        const form = document.getElementById('forgotForm');
        const successBanner = document.getElementById('successBanner');
        const submitButton = document.getElementById('submitButton');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitButton.disabled = true;
            submitButton.textContent = 'Sending…';

            const email = document.getElementById('email').value.trim();

            try {
                const response = await fetch(`${API_BASE}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await response.json();
                // Deliberately the SAME message whether or not the email
                // exists — the backend never reveals account existence.
                successBanner.textContent = data.message || 'If that email is registered, a reset link has been sent.';
                successBanner.classList.add('visible');
                form.reset();
            } catch (err) {
                successBanner.textContent = 'Could not reach the server. Is the backend running?';
                successBanner.classList.add('visible');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Send reset link';
            }
        });
    </script>
</body>
</html>
