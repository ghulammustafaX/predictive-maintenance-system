<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password</title>
    <link rel="stylesheet" href="auth-shared.css">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon/favicon-light.svg">
</head>
<body class="auth-page-body">
    <div class="auth-shell">
        <div class="auth-card">
            <h2>Choose a new password</h2>
            <p class="subtitle" id="subtitle">This link is single-use and time-limited.</p>

            <div class="banner error" id="errorBanner"></div>
            <div class="banner success" id="successBanner"></div>

            <form id="resetForm">
                <div class="field">
                    <label for="password">New password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="••••••••">
                </div>
                <p class="password-rules" id="passwordRules">
                    Must be 8+ characters with an uppercase letter, lowercase letter, digit, and special character.
                </p>
                <button class="cta" type="submit" id="submitButton">Reset password</button>
            </form>

            <p class="auth-links">
                <a href="login.html">Back to sign in</a>
            </p>
        </div>
    </div>

    <script src="auth-shared.js"></script>
    <script>
        const form = document.getElementById('resetForm');
        const errorBanner = document.getElementById('errorBanner');
        const successBanner = document.getElementById('successBanner');
        const submitButton = document.getElementById('submitButton');
        const passwordInput = document.getElementById('password');
        const passwordRules = document.getElementById('passwordRules');

        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
            errorBanner.textContent = 'This link is missing its reset token. Please request a new one.';
            errorBanner.classList.add('visible');
            form.querySelectorAll('input, button').forEach(el => el.disabled = true);
        }

        function showError(message) {
            successBanner.classList.remove('visible');
            errorBanner.textContent = message;
            errorBanner.classList.add('visible');
        }

        passwordInput.addEventListener('input', () => {
            const value = passwordInput.value;
            const checks = [
                [value.length >= 8, '8+ characters'],
                [/[A-Z]/.test(value), 'an uppercase letter'],
                [/[a-z]/.test(value), 'a lowercase letter'],
                [/\d/.test(value), 'a digit'],
                [/[^A-Za-z0-9]/.test(value), 'a special character'],
            ];
            const missing = checks.filter(([ok]) => !ok).map(([, label]) => label);
            passwordRules.textContent = missing.length
                ? `Still needs: ${missing.join(', ')}.`
                : 'Looks good!';
            passwordRules.style.color = missing.length ? 'var(--error)' : 'var(--success)';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBanner.classList.remove('visible');
            submitButton.disabled = true;
            submitButton.textContent = 'Resetting…';

            try {
                const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: passwordInput.value }),
                });
                const data = await response.json();

                if (!response.ok) {
                    showError(data.detail || 'Could not reset password.');
                    return;
                }

                form.style.display = 'none';
                successBanner.textContent = `${data.message} Redirecting to sign in…`;
                successBanner.classList.add('visible');
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } catch (err) {
                showError('Could not reach the server. Is the backend running?');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Reset password';
            }
        });
    </script>
</body>
</html>
