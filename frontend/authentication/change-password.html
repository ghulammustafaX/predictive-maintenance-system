<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password — Predictive Maintenance System</title>
    <link rel="stylesheet" href="auth-shared.css">
    <!-- Theme-aware favicons using media queries -->
    <link rel="icon" type="image/svg+xml" href="../assets/favicon/favicon-light.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/svg+xml" href="../assets/favicon/favicon-dark.svg" media="(prefers-color-scheme: dark)">
</head>
<body class="auth-page-body">
    <div class="auth-shell">
        <div class="auth-card">
            <h2>Change your password</h2>
            <p class="subtitle">You'll need your current password to confirm.</p>

            <div class="banner error" id="errorBanner"></div>
            <div class="banner success" id="successBanner"></div>

            <form id="changeForm">
                <div class="field">
                    <label for="currentPassword">Current password</label>
                    <input type="password" id="currentPassword" required autocomplete="current-password" placeholder="••••••••">
                </div>
                <div class="field">
                    <label for="newPassword">New password</label>
                    <input type="password" id="newPassword" required autocomplete="new-password" placeholder="••••••••">
                </div>
                <p class="password-rules" id="passwordRules">
                    Must be 8+ characters with an uppercase letter, lowercase letter, digit, and special character.
                </p>
                <button class="cta" type="submit" id="submitButton">Update password</button>
            </form>

            <p class="auth-links">
                <a href="../dashboard/index.html">Back to dashboard</a>
            </p>
        </div>
    </div>

    <script src="auth-shared.js"></script>
    <script>
        Auth.requireAuth();

        const form = document.getElementById('changeForm');
        const errorBanner = document.getElementById('errorBanner');
        const successBanner = document.getElementById('successBanner');
        const submitButton = document.getElementById('submitButton');
        const newPasswordInput = document.getElementById('newPassword');
        const passwordRules = document.getElementById('passwordRules');

        function showError(message) {
            successBanner.classList.remove('visible');
            errorBanner.textContent = message;
            errorBanner.classList.add('visible');
        }

        newPasswordInput.addEventListener('input', () => {
            const value = newPasswordInput.value;
            const checks = [
                [value.length >= 8, '8+ characters'],
                [/[A-Z]/.test(value), 'an uppercase letter'],
                [/[a-z]/.test(value), 'a lowercase letter'],
                [/\d/.test(value), 'a digit'],
                [/[^A-Za-z0-9]/.test(value), 'a special character'],
            ];
            const missing = checks.filter(([ok]) => !ok).map(([, label]) => label);
            passwordRules.textContent = missing.length
                ? `Still needs: ${missing.join(', ')}.`
                : 'Looks good!';
            passwordRules.style.color = missing.length ? 'var(--error)' : 'var(--success)';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBanner.classList.remove('visible');
            successBanner.classList.remove('visible');
            submitButton.disabled = true;
            submitButton.textContent = 'Updating…';

            const current_password = document.getElementById('currentPassword').value;
            const new_password = newPasswordInput.value;

            try {
                const response = await Auth.authedFetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password, new_password }),
                });
                const data = await response.json();

                if (!response.ok) {
                    showError(data.detail || 'Could not update password.');
                    return;
                }

                successBanner.textContent = data.message;
                successBanner.classList.add('visible');
                form.reset();
                passwordRules.textContent = 'Must be 8+ characters with an uppercase letter, lowercase letter, digit, and special character.';
                passwordRules.style.color = 'var(--muted)';
            } catch (err) {
                showError('Could not reach the server.');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Update password';
            }
        });
    </script>
</body>
</html>
